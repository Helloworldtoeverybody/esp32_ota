name: ESP32 Build + OTA Release

on:
  push:
    branches: [ "main" ]

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      # 1. Checkout repo
      - name: Checkout repository
        uses: actions/checkout@v4

      # 2. Setup Python
      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      # 3. Install PlatformIO
      - name: Install PlatformIO
        run: pip install -U platformio

      # 4. Build firmware (AUTO VERSION INJECTION)
      - name: Build firmware
        run: |
          VERSION=${{ github.run_number }}
          export PLATFORMIO_BUILD_FLAGS="-DFW_VERSION=\"${VERSION}\""
          pio run -e esp32dev

      # 5. Copy firmware to root
      - name: Prepare firmware file
        run: cp .pio/build/esp32dev/firmware.bin firmware.bin

      # 6. Upload artifact (debug)
      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: firmware
          path: firmware.bin

      # 7. Create GitHub Release (OTA SOURCE)
      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ github.run_number }}
          name: ESP32 Firmware v${{ github.run_number }}
          files: firmware.bin
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
